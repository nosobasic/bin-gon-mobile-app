name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "Select action (deploy or rollback)"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - rollback
      branch:
        description: "Branch to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Deploy or Rollback on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.EC2_PATH }}

            ACTION="${{ github.event.inputs.action }}"
            BRANCH="${{ github.event.inputs.branch }}"

            if [ -z "$ACTION" ]; then
              ACTION="deploy"
            fi

            if [ -z "$BRANCH" ]; then
              BRANCH="main"
            fi

            if [ "$ACTION" = "rollback" ]; then
              echo "Rolling back to previous commit..."
              git reset --hard HEAD~1
            else
              echo "Deploying latest code from $BRANCH..."
              git fetch origin
              git checkout $BRANCH
              git pull origin $BRANCH
            fi

            npm install

            pm2 reload bingone || pm2 start src/index.js --name bingone
